<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Refeições</title>
    <link rel="stylesheet" href="estilos/addrefeicao.css">
    <script src="https://kit.fontawesome.com/af61149184.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="imagens/logoGrandeParaFavicon.png" type="image/x-icon">
    
</head>
<body>
    <main>
        <div class="container">
        <header class="header">
            <div id="img-logo"><img src="imagens/logo.png" alt=""></div>
            <button type="button"><a href="home.html" class="voltar">Voltar <i class="fa-solid fa-arrow-right" style="color: rgb(255, 255, 255);"></i></a></button>
        </header>
        
        <div class="refeicoes-container"> 
            
            <div class="refeicao">
                <div class="container-item">
                    <div class="linha-topo">
                        <i class="fa-solid fa-bars" style="color: rgb(0, 0, 0);"></i>
                        <input type="time" class="input-pequeno">

                        <select name="tipoRefeicao" class="select-refeicao">
                            <option value="cafeDaManha" selected>Cafe da manha</option>
                            <option value="lanche">Lanche</option>
                            <option value="almoco">Almoço</option>
                            <option value="jantar">Jantar</option>
                        </select>

                        <div class="acoes">
                            <button type="button" class="btn-remover">Remover refeição <i class="fa-solid fa-xmark" style="color: rgb(255, 255, 255);"></i></button>
                            <button type="button" class="btn-adicionar">Adicionar refeição <i class="fa-solid fa-plus" style="color: rgb(255, 255, 255);"></i></button>
                        </div>
                    </div>

                    <div class="conteudo">
                        <div class="coluna">
                            <input type="text" placeholder="alimento Nº 1"> 
                            <input type="text" placeholder="alimento Nº 2"> 
                            <input type="text" placeholder="alimento Nº 3"> 
                            <input type="text" placeholder="alimento Nº 4">
                        </div>
                        <div class="coluna">
                            <input type="text" placeholder="Quantidade do alimento Nº 1"> 
                            <input type="text" placeholder="Quantidade do alimento Nº 2"> 
                            <input type="text" placeholder="Quantidade do alimento Nº 3"> 
                            <input type="text" placeholder="Quantidade do alimento Nº 4">
                        </div>
                    </div>
                </div>
                
            </div> </div> 
        <button type="button" class="btnCalcular">Calcular a analise nutricional <i class="fa-solid fa-plus" style="color: rgb(255, 255, 255);"></i></button></div>
            
    </main>
    <script src="addrefeicao.js"></script>
</body>
</html>
