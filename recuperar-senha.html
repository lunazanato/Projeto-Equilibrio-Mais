<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos/recuperar-senha.css">
    <link rel="shortcut icon" href="imagens/logoGrandeParaFavicon.png" type="image/x-icon">
</head>
<body>

    <a href="index.html" class="btn-sair" aria-label="Sair">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#06331e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
    </a>

    <header class="header">
        <img src="imagens/logoGrandeParaFavicon.png" alt="Logo Equilíbrio+" class="logo">
    </header>

    <main class="container">
        <h1 class="titulo">Recuperar senha</h1>
        <p class="descricao">
            Para recuperar sua senha, digite o e-mail utilizado na sua conta do Equilíbrio+.
        </p>

        <form id="recoveryForm" class="formulario">
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" required autocomplete="email">
            </div>
            
            <button type="submit" class="btn-recuperar">Recuperar senha</button>
        </form>
    </main>

    <script src="recuperar-senha.js"></script>
</body>
</html>
