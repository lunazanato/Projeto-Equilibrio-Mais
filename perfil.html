<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Usuário</title>
    <link rel="stylesheet" href="estilos/perfil.css">
    <script src="https://kit.fontawesome.com/af61149184.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="imagens/logoGrandeParaFavicon.png" type="image/x-icon">
</head>

<body>
    <main>
        <div class="container-cadastro">
            <!-- TOPO -->
            <div class="header">
                <h1 id="boas-vindas">Bem vindo(a), Clau!</h1>
                <p>Ter, 12 Abril 2026</p>
            </div>
        
             
            <div class="container-card"> <!-- CARD -->
                <!-- PERFIL -->
                <div class="perfil">
                    <img src="imagens/usuario.png" alt="">
        
                    <div class="info">
                        <h2 id="perfil-nome">Clau</h2>
                        <p id="perfil-email">claudiamaria123@gmail.com</p>
                    </div>
                    <button type="submit" class="btn" id="btn-salvar">Salvar <i class="fa-regular fa-floppy-disk" style="color: rgb(255, 255, 255);"></i></button>
                    <button type="submit" class="btn" id="btn-editar">Editar <i class="fa-solid fa-pen fa-xs" style="color: rgb(255, 255, 255);"></i></button>
                </div>
        
                <!-- FORM -->
                <div class="form">
        
                    <div class="campo">
                        <label for="NomeCompleto">Nome completo</label>
                        <input type="text" id="NomeCompleto" value="Cláudia Maria dos Santos Braga">
                    </div>
        
                    <div class="campo">
                        <label for="NomeUsuario">Nome de usuário</label>
                        <input type="text" id="NomeUsuario" value="Clau">
                    </div>
        
                    <div class="campo">
                        <label for="genero">Gênero</label>
                        <select name="" id="genero">
                            <option value="feminino">Feminino</option>
                            <option value="masculino">Masculino</option>
                            <option value="nao binario">Não-binário</option>
                        </select>
                    </div>
        
                    <div class="campo">
                        <label for="pais">País</label>
                        <select name="" id="pais">
                            <option value="brasil">Brasil</option>
                            <option value="portugal">Portugal</option>
                            <option value="eua">Estados Unidos</option>
                            <option value="franca">Franca</option>
                            <option value="mocambique">Moçambique</option>
                            <option value="angola">Angola</option>
                        </select>
                    </div>
        
                    <div class="campo">
                        <label for="lingua">Língua</label>
                        <select id="lingua">
                            <option value="portugues brasileiro">Português (Brasil)</option>
                            <option value="portugues mocambique">Português (Moçambique)</option>
                            <option value="portugues angola">Português (Angola)</option>
                            <option value="portugues" selected>Português (Portugal)</option> <!-- Opção pré-selecionada -->
                            <option value="ingles eua">inglês (EUA)</option>
                            <option value="ingles uk">inglês (UK)</option>
                        </select>
                    </div>
        
                    <div class="campo">
                        <label for="email">Email</label>
                        <input type="text" id="email" value="claudiamaria123@gmail.com">
                    </div>
        
                    <div class="campo">
                        <label for="telefone">Telefone</label>
                        <input type="text" id="telefone" value="(16)99234-5691">
                    </div>
        
                    <div class="campo">
                        <label for="senha">Senha </label> 
                        <input type="password" id="senha" value="*************">
                        
                    </div>
        
                </div> <!-- FIM DO FORM -->
                <button type="submit" class="btn" id="btn-voltar"><a href="home.html">Voltar</a></button>
            </div> <!-- FIM DO CARD -->
        
        </div>
        
    </main>
    <script src="perfil.js"></script>
</body>
</html>
